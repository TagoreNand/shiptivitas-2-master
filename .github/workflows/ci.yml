name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: shiptivity
          POSTGRES_PASSWORD: shiptivity
          POSTGRES_DB: shiptivity
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U shiptivity"
          --health-interval 5s --health-timeout 3s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 10

    env:
      DATABASE_URL: postgres://shiptivity:shiptivity@localhost:5432/shiptivity
      REDIS_URL: redis://localhost:6379

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # Switch to `npm ci` once a package-lock.json is committed.
      - run: npm install --no-audit --no-fund
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Unit tests (pure logic + service)
        run: npm test
      - name: Migrate (integration smoke)
        run: npm run migrate
      - name: Build
        run: npm run build

  integration:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install --no-audit --no-fund
      # Testcontainers spins up real Postgres in Docker (available on the runner).
      - name: Integration + concurrency tests
        run: npm run test:integration

  docker:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: shiptivity-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
